<div class="w-full px-4 my-3">
  <p-card>
    <ng-template pTemplate="header">
      <div class="flex items-center justify-between p-4">
        <div class="flex items-center gap-3">
          <app-voltar (backClick)="back()"></app-voltar>
          <h2 class="text-xl font-semibold m-0">Cadastro de Usuário</h2>
        </div>
        @if (canShowPasswordChange()) {
          <p-button
            type="button"
            [outlined]="true"
            [rounded]="true"
            severity="secondary"
            pTooltip="Redefinir senha"
            tooltipPosition="left"
            (onClick)="showDialogChangeSenha()"
            [attr.aria-label]="'Redefinir senha do usuário'">
            <span pButtonIcon class="pi pi-lock"></span>
          </p-button>
        }
      </div>
    </ng-template>

    <ng-template pTemplate="content">
      @if (form(); as formGroup) {
        <form [formGroup]="formGroup" (ngSubmit)="save()" class="flex flex-col gap-4">
          <div class="grid grid-cols-12 gap-4">
            <!-- Código Field -->
            <div class="col-span-12 md:col-span-2">
              <app-form-field
                [control]="formGroup.get('id')"
                label="Código"
                fieldId="id">
                <input
                  pInputText
                  id="id"
                  formControlName="id"
                  class="w-full"
                  readonly />
              </app-form-field>
            </div>

            <!-- Nome Field -->
            <div class="col-span-12 md:col-span-4">
              <app-form-field
                [control]="formGroup.get('nome')"
                label="Nome"
                [required]="true"
                fieldId="nome"
                hint="Digite o nome completo">
                <input
                  pInputText
                  id="nome"
                  formControlName="nome"
                  class="w-full"
                  placeholder="Ex: João Silva" />
              </app-form-field>
            </div>

            <!-- Email Field -->
            <div class="col-span-12 md:col-span-3">
              <app-form-field
                [control]="formGroup.get('email')"
                label="Email"
                [required]="true"
                fieldId="email"
                hint="Digite um e-mail válido">
                <input
                  pInputText
                  id="email"
                  type="email"
                  formControlName="email"
                  class="w-full"
                  placeholder="exemplo@email.com" />
              </app-form-field>
            </div>

            <!-- Telefone Field -->
            <div class="col-span-12 md:col-span-3">
              <app-form-field
                [control]="formGroup.get('telefone')"
                label="Telefone"
                [required]="true"
                fieldId="telefone"
                hint="Digite o telefone com DDD">
                <p-inputMask
                  id="telefone"
                  formControlName="telefone"
                  mask="(99) 99999-9999"
                  placeholder="(00) 00000-0000"
                  styleClass="w-full">
                </p-inputMask>
              </app-form-field>
            </div>
          </div>

          <div class="grid grid-cols-12 gap-4">
            <!-- Grupo de Acesso Field -->
            <div class="col-span-12 md:col-span-3">
              <app-form-field
                [control]="formGroup.get('permissoes')"
                label="Grupo de Acesso"
                [required]="true"
                fieldId="permissoes"
                hint="Selecione um ou mais grupos">
                <p-multiSelect
                  id="permissoes"
                  formControlName="permissoes"
                  [options]="grupoAcessoDropdown()"
                  optionLabel="label"
                  optionValue="value"
                  placeholder="Nenhum Selecionado"
                  [showToggleAll]="false"
                  display="chip"
                  styleClass="w-full">
                </p-multiSelect>
              </app-form-field>
            </div>

            <!-- RA/SIAPE Field -->
            <div class="col-span-12 md:col-span-3">
              <app-form-field
                [control]="formGroup.get('documento')"
                label="RA/SIAPE"
                fieldId="documento"
                hint="Registro Acadêmico ou SIAPE">
                <input
                  pInputText
                  id="documento"
                  formControlName="documento"
                  class="w-full"
                  placeholder="Ex: 1234567" />
              </app-form-field>
            </div>

            <!-- Usuário Field -->
            <div [class]="!isEditMode() ? 'col-span-12 md:col-span-3' : 'col-span-12 md:col-span-6'">
              <app-form-field
                [control]="formGroup.get('username')"
                label="Usuário"
                [required]="true"
                fieldId="username"
                hint="Nome de usuário para login">
                <input
                  pInputText
                  id="username"
                  formControlName="username"
                  class="w-full"
                  placeholder="Ex: joaosilva" />
              </app-form-field>
            </div>

            <!-- Senha Field (only for new users) -->
            @if (!isEditMode()) {
              <div class="col-span-12 md:col-span-3">
                <app-form-field
                  [control]="formGroup.get('password')"
                  label="Senha"
                  [required]="true"
                  fieldId="password"
                  hint="Mínimo de 6 caracteres">
                  <p-password
                    id="password"
                    formControlName="password"
                    [toggleMask]="true"
                    [feedback]="false"
                    placeholder="Digite a senha"
                    styleClass="w-full"
                    inputStyleClass="w-full">
                  </p-password>
                </app-form-field>
              </div>
            }
          </div>

          <!-- Action Buttons -->
          <div class="flex justify-end gap-2 mt-4">
            <app-cancelar (cancelClick)="back()"></app-cancelar>
            <app-salvar [typeButton]="'submit'" [disabled]="isLoading()"></app-salvar>
          </div>
        </form>
      }
    </ng-template>
  </p-card>
</div>

<!-- Redefinir Senha Dialog -->
<p-dialog
  header="Redefinir Senha"
  [visible]="dialogChangeSenha()"
  (visibleChange)="dialogChangeSenha.set($event)"
  [modal]="true"
  [baseZIndex]="Z_INDEX.DIALOG"
  class="dialog-md"
  [focusOnShow]="false"
  [dismissableMask]="true">

  <ng-template pTemplate="content">
    @if (formChangeSenha(); as passwordForm) {
      <form [formGroup]="passwordForm" (ngSubmit)="redefinirSenha()" class="flex flex-col gap-4">
        <!-- Senha Atual -->
        <app-form-field
          [control]="passwordForm.get('senhaAtual')"
          label="Senha Atual"
          [required]="true"
          fieldId="senhaAtual">
          <p-password
            id="senhaAtual"
            formControlName="senhaAtual"
            [toggleMask]="true"
            [feedback]="false"
            placeholder="Digite a senha atual"
            styleClass="w-full"
            inputStyleClass="w-full">
          </p-password>
        </app-form-field>

        <!-- Nova Senha -->
        <app-form-field
          [control]="passwordForm.get('novaSenha')"
          label="Nova Senha"
          [required]="true"
          fieldId="novaSenha"
          hint="Mínimo de 6 caracteres">
          <p-password
            id="novaSenha"
            formControlName="novaSenha"
            [toggleMask]="true"
            [feedback]="true"
            placeholder="Digite a nova senha"
            styleClass="w-full"
            inputStyleClass="w-full">
          </p-password>
        </app-form-field>

        <!-- Confirmar Nova Senha -->
        <app-form-field
          [control]="passwordForm.get('confirmarNovaSenha')"
          label="Confirme a nova senha"
          [required]="true"
          fieldId="confirmarNovaSenha">
          <p-password
            id="confirmarNovaSenha"
            formControlName="confirmarNovaSenha"
            [toggleMask]="true"
            [feedback]="false"
            placeholder="Confirme a nova senha"
            styleClass="w-full"
            inputStyleClass="w-full">
          </p-password>
        </app-form-field>

        <!-- Dialog Action Buttons -->
        <div class="flex justify-end gap-2 mt-2">
          <p-button
            type="button"
            label="Cancelar"
            severity="secondary"
            [outlined]="true"
            (onClick)="dialogChangeSenha.set(false)">
          </p-button>
          <p-button
            type="submit"
            label="Salvar"
            severity="primary">
          </p-button>
        </div>
      </form>
    }
  </ng-template>
</p-dialog>
