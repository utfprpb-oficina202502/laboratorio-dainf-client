<div class="w-full px-4 my-3">
  <p-card>
    <ng-template pTemplate="header">
      <div class="flex items-center justify-between p-4">
        <div class="flex items-center gap-3">
          <app-voltar (backClick)="back()"></app-voltar>
          <h2 class="text-xl font-semibold m-0">Cadastro de Fornecedor</h2>
        </div>
      </div>
    </ng-template>

    <ng-template pTemplate="content">
      @if (form(); as formGroup) {
        <form [formGroup]="formGroup" (ngSubmit)="save()" class="flex flex-col gap-4">
          <!-- Row 1: ID, Razão Social, Nome Fantasia -->
          <div class="grid grid-cols-12 gap-4">
            <div class="col-span-12 md:col-span-2">
              <app-form-field
                [control]="formGroup.get('id')"
                label="Código"
                fieldId="id">
                <input
                  pInputText
                  id="id"
                  formControlName="id"
                  class="w-full"
                  readonly />
              </app-form-field>
            </div>

            <div class="col-span-12 md:col-span-5">
              <app-form-field
                [control]="formGroup.get('razaoSocial')"
                label="Razão Social"
                [required]="true"
                fieldId="razaoSocial"
                hint="Digite a razão social da empresa">
                <input
                  pInputText
                  id="razaoSocial"
                  formControlName="razaoSocial"
                  class="w-full"
                  placeholder="Ex: Empresa LTDA" />
              </app-form-field>
            </div>

            <div class="col-span-12 md:col-span-5">
              <app-form-field
                [control]="formGroup.get('nomeFantasia')"
                label="Nome Fantasia"
                [required]="true"
                fieldId="nomeFantasia"
                hint="Digite o nome fantasia da empresa">
                <input
                  pInputText
                  id="nomeFantasia"
                  formControlName="nomeFantasia"
                  class="w-full"
                  placeholder="Ex: Empresa" />
              </app-form-field>
            </div>
          </div>

          <!-- Row 2: CNPJ, IE, Telefone, Email -->
          <div class="grid grid-cols-12 gap-4">
            <div class="col-span-12 md:col-span-3">
              <app-form-field
                [control]="formGroup.get('cnpj')"
                label="CNPJ"
                [required]="true"
                fieldId="cnpj"
                hint="Digite no formato 00.000.000/0000-00">
                <p-input-mask
                  id="cnpj"
                  formControlName="cnpj"
                  mask="99.999.999/9999-99"
                  [unmask]="true"
                  class="w-full"
                  placeholder="00.000.000/0000-00"
                  aria-label="CNPJ">
                </p-input-mask>
              </app-form-field>
            </div>

            <div class="col-span-12 md:col-span-3">
              <app-form-field
                [control]="formGroup.get('ie')"
                label="Inscrição Estadual"
                [required]="true"
                fieldId="ie"
                hint="Digite apenas números">
                <input
                  pInputText
                  id="ie"
                  formControlName="ie"
                  onlyNumber
                  class="w-full"
                  placeholder="000000000" />
              </app-form-field>
            </div>

            <div class="col-span-12 md:col-span-3">
              <app-form-field
                [control]="formGroup.get('telefone')"
                label="Telefone"
                [required]="true"
                fieldId="telefone"
                hint="Digite o telefone com DDD">
                <p-input-mask
                  id="telefone"
                  formControlName="telefone"
                  mask="(99) 9999?9-9999"
                  [unmask]="true"
                  class="w-full"
                  placeholder="(00) 00000-0000 ou (00) 0000-0000"
                  aria-label="Telefone">
                </p-input-mask>
              </app-form-field>
            </div>

            <div class="col-span-12 md:col-span-3">
              <app-form-field
                [control]="formGroup.get('email')"
                label="E-mail"
                [required]="true"
                fieldId="email"
                hint="Digite um e-mail válido">
                <input
                  pInputText
                  id="email"
                  type="email"
                  formControlName="email"
                  class="w-full"
                  placeholder="exemplo@email.com" />
              </app-form-field>
            </div>
          </div>

          <!-- Row 3: Endereço, Estado, Cidade -->
          <div class="grid grid-cols-12 gap-4">
            <div class="col-span-12 md:col-span-4">
              <app-form-field
                [control]="formGroup.get('endereco')"
                label="Endereço"
                [required]="true"
                fieldId="endereco"
                hint="Digite o endereço completo">
                <input
                  pInputText
                  id="endereco"
                  formControlName="endereco"
                  class="w-full"
                  placeholder="Rua, número, bairro" />
              </app-form-field>
            </div>

            <div class="col-span-12 md:col-span-4">
              <app-form-field
                [control]="formGroup.get('estado')"
                label="Estado"
                [required]="true"
                fieldId="estado"
                hint="Digite pelo menos 2 caracteres para buscar">
                <p-autoComplete
                  inputId="estado"
                  formControlName="estado"
                  optionLabel="nome"
                  dataKey="id"
                  appendTo="body"
                  [forceSelection]="true"
                  [minQueryLength]="2"
                  [suggestions]="estadoList()"
                  (completeMethod)="findEstados($event)"
                  (onSelect)="onEstadoChange()"
                  styleClass="w-full"
                  [inputStyleClass]="'w-full'"
                  placeholder="Digite para buscar...">
                </p-autoComplete>
              </app-form-field>
            </div>

            <div class="col-span-12 md:col-span-4">
              <app-form-field
                [control]="formGroup.get('cidade')"
                label="Cidade"
                [required]="true"
                fieldId="cidade"
                hint="Digite pelo menos 2 caracteres para buscar">
                <p-autoComplete
                  inputId="cidade"
                  formControlName="cidade"
                  optionLabel="nome"
                  dataKey="id"
                  [forceSelection]="true"
                  [disabled]="!formGroup.get('estado')?.value"
                  minQueryLength="2"
                  [suggestions]="cidadeList()"
                  (completeMethod)="findCidadesByEstado($event)"
                  styleClass="w-full"
                  [inputStyleClass]="'w-full'"
                  placeholder="Digite para buscar...">
                </p-autoComplete>
              </app-form-field>
            </div>
          </div>

          <!-- Row 4: Observação -->
          <div class="grid grid-cols-12 gap-4">
            <div class="col-span-12">
              <app-form-field
                [control]="formGroup.get('observacao')"
                label="Observação"
                fieldId="observacao"
                hint="Informações adicionais (máximo 2000 caracteres)">
                <textarea
                  pInputTextarea
                  id="observacao"
                  formControlName="observacao"
                  rows="4"
                  maxlength="2000"
                  class="w-full"
                  placeholder="Digite observações adicionais">
                </textarea>
              </app-form-field>
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="flex justify-end gap-2 mt-4">
            <app-cancelar (cancelClick)="back()"></app-cancelar>
            <app-salvar [typeButton]="'submit'" [disabled]="isLoading()"></app-salvar>
          </div>
        </form>
      }
    </ng-template>
  </p-card>
</div>
