<div class="container-fluid my-3">
  <p-card>
    <ng-template pTemplate="header">
      <div class="flex items-center justify-between p-4">
        <div class="flex items-center gap-3">
          <app-voltar (onClick)="back()"></app-voltar>
          <h2 class="text-xl font-semibold m-0">Cadastro de Estado</h2>
        </div>
      </div>
    </ng-template>

    <ng-template pTemplate="content">
      @if (form(); as formGroup) {
        <form [formGroup]="formGroup" (ngSubmit)="save()" class="flex flex-col gap-4">
          <div class="grid grid-cols-12 gap-4">
            <!-- ID Field (read-only) -->
            <div class="col-span-12 md:col-span-3">
              <app-form-field
                [control]="formGroup.get('id')"
                label="Código"
                fieldId="id">
                <input
                  pInputText
                  id="id"
                  formControlName="id"
                  class="w-full"
                  readonly />
              </app-form-field>
            </div>

            <!-- Nome Field (required) -->
            <div class="col-span-12 md:col-span-3">
              <app-form-field
                [control]="formGroup.get('nome')"
                label="Nome"
                [required]="true"
                fieldId="nome"
                hint="Digite o nome do estado">
                <input
                  pInputText
                  id="nome"
                  formControlName="nome"
                  class="w-full"
                  placeholder="Ex: Paraná" />
              </app-form-field>
            </div>

            <!-- UF Field (required) -->
            <div class="col-span-12 md:col-span-3">
              <app-form-field
                [control]="formGroup.get('uf')"
                label="UF"
                [required]="true"
                fieldId="uf"
                hint="Sigla do estado">
                <input
                  pInputText
                  id="uf"
                  formControlName="uf"
                  class="w-full"
                  placeholder="Ex: PR"
                  maxlength="2" />
              </app-form-field>
            </div>

            <!-- País Field (required, autocomplete) -->
            <div class="col-span-12 md:col-span-3">
              <app-form-field
                [control]="formGroup.get('pais')"
                label="País"
                [required]="true"
                fieldId="pais"
                hint="Selecione o país">
                <p-autoComplete
                  inputId="pais"
                  formControlName="pais"
                  [suggestions]="paisList()"
                  optionLabel="nome"
                  dataKey="id"
                  [dropdown]="true"
                  [forceSelection]="true"
                  placeholder="Digite para buscar..."
                  appendTo="body"
                  styleClass="w-full"
                  [inputStyle]="{ width: '100%' }"
                  (completeMethod)="findPaises($event)"
                  (onClear)="formGroup.get('pais')?.setValue(null)">
                </p-autoComplete>
              </app-form-field>
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="flex justify-end gap-2 mt-4">
            <app-cancelar (onClick)="back()"></app-cancelar>
            <app-salvar [typeButton]="'submit'" [disabled]="isLoading()"></app-salvar>
          </div>
        </form>
      }
    </ng-template>
  </p-card>
</div>
