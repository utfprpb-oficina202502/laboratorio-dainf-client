<div class="container-fluid my-3">
  <p-card>
    <ng-template pTemplate="header">
      <div class="flex items-center justify-between p-4">
        <div class="flex items-center gap-3">
          <app-voltar (onClick)="back()"></app-voltar>
          <h2 class="text-xl font-semibold m-0">Cadastro de País</h2>
        </div>
      </div>
    </ng-template>

    <ng-template pTemplate="content">
      @if (form(); as formGroup) {
        <form [formGroup]="formGroup" (ngSubmit)="save()" class="flex flex-col gap-4">
          <div class="grid grid-cols-12 gap-4">
            <!-- ID Field (read-only) -->
            <div class="col-span-12 md:col-span-2">
              <app-form-field
                [control]="formGroup.get('id')"
                label="Código"
                fieldId="id">
                <input
                  pInputText
                  id="id"
                  formControlName="id"
                  class="w-full"
                  readonly />
              </app-form-field>
            </div>

            <!-- Nome Field (required) -->
            <div class="col-span-12 md:col-span-9">
              <app-form-field
                [control]="formGroup.get('nome')"
                label="Nome"
                [required]="true"
                fieldId="nome"
                hint="Digite o nome do país">
                <input
                  pInputText
                  id="nome"
                  formControlName="nome"
                  class="w-full"
                  placeholder="Ex: Brasil" />
              </app-form-field>
            </div>

            <!-- Sigla Field (required) -->
            <div class="col-span-12 md:col-span-1">
              <app-form-field
                [control]="formGroup.get('sigla')"
                label="Sigla"
                [required]="true"
                fieldId="sigla"
                hint="Sigla do país">
                <input
                  pInputText
                  id="sigla"
                  formControlName="sigla"
                  class="w-full"
                  placeholder="Ex: BR" />
              </app-form-field>
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="flex justify-end gap-2 mt-4">
            <app-cancelar (onClick)="back()"></app-cancelar>
            <app-salvar [typeButton]="'submit'" [disabled]="isLoading()"></app-salvar>
          </div>
        </form>
      }
    </ng-template>
  </p-card>
</div>
