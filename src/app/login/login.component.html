@if (showProgress) {
  <p-progressBar mode="indeterminate" class="login-progress"></p-progressBar>
}

<div class="login-page">
  <section class="login-panel">
    <header class="login-header">
      <img ngSrc="assets/utfpr.jpg" alt="Logo UTFPR" class="login-logo" height="117" width="335"/>
      <span class="login-title">Sistema Laboratório - Login</span>
    </header>

    <form
      #form="ngForm"
      class="login-form"
      (ngSubmit)="login()"
      novalidate
    >
      <input
        pInputText
        type="email"
        id="username"
        name="username"
        required
        autocomplete="username"
        placeholder="Email institucional"
        aria-label="Email institucional"
        [(ngModel)]="usuario.username"
        class="login-input"
      />

      <input
        pInputText
        type="password"
        id="password"
        name="password"
        required
        autocomplete="current-password"
        placeholder="Senha"
        aria-label="Senha"
        [(ngModel)]="usuario.password"
        class="login-input"
      />

      <menu class="login-links" role="list">
        <button type="button" (click)="recuperarSenha()" class="login-link">
          Esqueceu sua senha?
        </button>
        <button type="button" (click)="cadastrar()" class="login-link">
          Ainda não possui cadastro? Cadastrar-se.
        </button>
        <button type="button" (click)="reenviarEmailConfirmacao()" class="login-link">
          Solicitar novo email de confirmação.
        </button>
      </menu>

      <button
        type="submit"
        [disabled]="form.invalid || showProgress"
        class="login-submit"
      >
        Acessar
      </button>
    </form>
  </section>
</div>
