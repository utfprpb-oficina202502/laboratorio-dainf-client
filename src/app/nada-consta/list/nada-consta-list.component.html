<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
  <h2>Listagem de Nada Consta</h2>
  <button mat-raised-button color="primary" (click)="adicionar()">Adicionar</button>
</div>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8" *ngIf="!carregando">
  <ng-container matColumnDef="alunoId">
    <th mat-header-cell *matHeaderCellDef>ID do Aluno</th>
    <td mat-cell *matCellDef="let element">{{element.alunoId}}</td>
  </ng-container>

  <ng-container matColumnDef="nome">
    <th mat-header-cell *matHeaderCellDef>Nome</th>
    <td mat-cell *matCellDef="let element">{{element.nome}}</td>
  </ng-container>

  <ng-container matColumnDef="nadaConsta">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let element">{{element.nadaConsta ? 'OK' : 'Com Pendências'}}</td>
  </ng-container>

  <ng-container matColumnDef="acoes">
    <th mat-header-cell *matHeaderCellDef>Ações</th>
    <td mat-cell *matCellDef="let element">
      <!-- Botões de ação futuros -->
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<mat-progress-bar *ngIf="carregando" mode="indeterminate"></mat-progress-bar>
