<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
  <h2>Listagem de Nada Consta</h2>
  <button pButton type="button" label="Adicionar" class="p-button-primary" (click)="adicionar()"></button>
</div>

<p-table [value]="dataSource" *ngIf="!carregando">
  <ng-template pTemplate="header">
    <tr>
      <th>ID do Aluno</th>
      <th>Nome</th>
      <th>Status</th>
      <th>Ações</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-element>
    <tr>
      <td>{{element.alunoId}}</td>
      <td>{{element.nome}}</td>
      <td>{{element.nadaConsta ? 'OK' : 'Com Pendências'}}</td>
      <td>
        <!-- Botões de ação futuros -->
      </td>
    </tr>
  </ng-template>
</p-table>

<p-progressBar *ngIf="carregando" mode="indeterminate" style="height: 6px;"></p-progressBar>
