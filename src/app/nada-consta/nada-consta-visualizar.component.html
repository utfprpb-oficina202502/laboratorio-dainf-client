<div class="container my-4" [attr.aria-busy]="carregando">
  <p-card>
    <ng-template pTemplate="header">
      Consulta Nada Consta
    </ng-template>
    <ng-template pTemplate="content">
      <form (ngSubmit)="consultar()" #form="ngForm">
        <div class="p-field">
          <label for="id">ID do Registro</label>
          <input pInputText type="number" [(ngModel)]="id" name="id" id="id" placeholder="Digite o ID do registro" required />
        </div>
        <button pButton type="submit" label="Consultar" [disabled]="carregando || form.invalid" class="p-button-outlined"></button>
      </form>
      <!-- Live region for accessibility -->
      <div class="sr-only" role="status" aria-live="polite">
        {{ liveRegionText }}
      </div>
      @if (carregando) {
        <p-progressBar mode="indeterminate" style="height: 6px;" aria-hidden="true"></p-progressBar>
      }
      @if (erro) {
        <div class="erro">{{ erro }}</div>
      }
      @if (resultado) {
        <h3>Resultado</h3>
        <p><strong>ID:</strong> {{ resultado.id }}</p>
        <p><strong>Usuário:</strong> {{ resultado.usuario.nome }}</p>
        <p><strong>Status:</strong> {{ resultado.status }}</p>
        <p><strong>Enviado em:</strong> {{ resultado.sendAt }}</p>
      }
    </ng-template>
  </p-card>
</div>
