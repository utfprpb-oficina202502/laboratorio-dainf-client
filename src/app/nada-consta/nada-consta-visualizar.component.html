<div class="container my-4">
  <p-card>
    <ng-template pTemplate="header">
      Consulta Nada Consta
    </ng-template>
    <ng-template pTemplate="content">
      <form (ngSubmit)="consultar()" #form="ngForm">
        <div class="p-field">
          <label for="alunoId">ID do Aluno</label>
          <input pInputText type="number" [(ngModel)]="alunoId" name="alunoId" id="alunoId" placeholder="Digite o ID do aluno" required />
        </div>
        <button pButton type="submit" label="Consultar" [disabled]="carregando || form.invalid" class="p-button-primary"></button>
      </form>
      <p-progressBar *ngIf="carregando" mode="indeterminate" style="height: 6px;"></p-progressBar>
      <div *ngIf="erro" class="erro">{{ erro }}</div>
      <div *ngIf="resultado">
        <h3>Resultado</h3>
        <p><strong>Aluno:</strong> {{ resultado.nome }} (ID: {{ resultado.alunoId }})</p>
        <p *ngIf="resultado.nadaConsta" class="ok">Nada consta para este aluno.</p>
        <div *ngIf="!resultado.nadaConsta">
          <p class="pendencia">Pendências encontradas:</p>
          <ul>
            <li *ngFor="let p of resultado.pendencias">
              <strong>{{ p.tipo }}:</strong> {{ p.descricao }}
            </li>
          </ul>
        </div>
      </div>
    </ng-template>
  </p-card>
</div>
