<p-toolbar [style.height.px]="50">
  <ng-template pTemplate="start">
    <div class="d-flex align-items-center gap-2">
      @if (widthScreen < 1200) {
        <button
          id="btn-sidenav"
          type="button"
          pButton
          class="p-button-text p-button-plain p-button-icon-only"
          (click)="toogleSidenav()"
          aria-label="Alternar navegação lateral"
        >
          <i class="pi pi-bars"></i>
        </button>
      }
      <img src="../../assets/logo.png" alt="Logo Laboratório DAINF" style="width: 40px" />
      @if (widthScreen >= 600) {
        <a
          routerLinkActive="active"
          routerLink="/"
          class="text-uppercase font-poppins text-decoration-none ms-2"
        >Sistema de Gerenciamento da Sala de Apoio do DAINF</a>
      }
      @if (widthScreen < 600) {
        <a
          routerLinkActive="active"
          routerLink="/"
          class="text-uppercase font-poppins text-decoration-none ms-2"
        >Lab DAINF</a>
      }
    </div>
  </ng-template>
  <ng-template pTemplate="end">
    <div class="d-flex align-items-center gap-3">
      @if (widthScreen > 768) {
        <button
          type="button"
          pButton
          class="p-button-text p-button-plain d-flex align-items-center gap-2"
          (click)="menu.toggle($event)"
        >
          <span>Olá, {{ getUserLogado() }}</span>
          <i class="pi pi-chevron-down"></i>
        </button>
        <p-tieredMenu #menu [model]="items" [popup]="true"></p-tieredMenu>
      }
      @if (widthScreen <= 768) {
        <button
          type="button"
          pButton
          class="p-button-rounded p-button-text p-button-plain p-button-icon-only"
          pTooltip="Sair"
          tooltipPosition="bottom"
          (click)="logout()"
          aria-label="Sair"
        >
          <i class="pi pi-sign-out"></i>
        </button>
      }
    </div>
  </ng-template>
</p-toolbar>
