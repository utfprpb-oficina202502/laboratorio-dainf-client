@if (loading()) {
  <div class="loader-overlay">
    <div class="loader-content">
      <p-progressSpinner
        class="loader-spinner"
        strokeWidth="3"
        animationDuration="1s"
        aria-label="Carregando conteúdo" />
      <span class="loader-text">Carregando...</span>

      @if (cancelAction()) {
        <button
          type="button"
          class="loader-cancel-btn"
          (click)="onCancel()"
          [attr.aria-label]="cancelLabel()">
          {{ cancelLabel() }}
        </button>
      }
    </div>
  </div>
}
