@if (loading()) {
  <div class="loader-overlay">
    <div class="loader-content">
      <p-progressSpinner
        class="loader-spinner"
        strokeWidth="3"
        animationDuration="1s"
        aria-label="Carregando conteúdo" />
      <span class="loader-text">Carregando...</span>
    </div>
  </div>
}
