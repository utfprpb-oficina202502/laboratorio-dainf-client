<p-button
  type="button"
  (onClick)="click()"
  pTooltip="Ajuda"
  [text]="true"
  [rounded]="true"
  severity="info"
  aria-label="Ajuda">
  <i class="pi pi-question-circle" class="text-3xl"></i>
</p-button>

<p-dialog
  header="Ajuda"
  [(visible)]="dialogHelp"
  [baseZIndex]="Z_INDEX.DIALOG"
  [modal]="true"
  class="dialog-sm">

  <div class="flex flex-col gap-4">
    <p class="max-w-md">{{ messageHelp() }}</p>
  </div>

  <ng-template pTemplate="footer">
    <div class="flex justify-end">
      <p-button
        type="button"
        label="OK"
        severity="primary"
        (onClick)="dialogHelp.set(false)"
        aria-label="Fechar ajuda">
      </p-button>
    </div>
  </ng-template>
</p-dialog>
