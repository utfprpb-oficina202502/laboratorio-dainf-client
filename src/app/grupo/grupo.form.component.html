<div class="w-full px-4 my-3">
  <p-card>
    <ng-template pTemplate="header">
      <div class="flex items-center justify-between p-4">
        <div class="flex items-center gap-3">
          <app-voltar (backClick)="back()"></app-voltar>
          <h2 class="text-xl font-semibold m-0">Cadastro de Grupo</h2>
        </div>
        @if (canShowItensVinculados()) {
          <p-button
            type="button"
            [outlined]="true"
            [rounded]="true"
            severity="secondary"
            pTooltip="Itens Vinculados"
            tooltipPosition="left"
            (onClick)="showDialogItensVinculados()"
            [attr.aria-label]="'Ver itens vinculados ao grupo'">
            <span pButtonIcon class="pi pi-box"></span>
          </p-button>
        }
      </div>
    </ng-template>

    <ng-template pTemplate="content">
      @if (form(); as formGroup) {
        <form [formGroup]="formGroup" (ngSubmit)="save()" class="flex flex-col gap-4">
          <div class="grid grid-cols-12 gap-4">
            <!-- Código Field -->
            <div class="col-span-12 md:col-span-2">
              <app-form-field
                [control]="formGroup.get('id')"
                label="Código"
                fieldId="id">
                <input
                  pInputText
                  id="id"
                  formControlName="id"
                  class="w-full"
                  readonly />
              </app-form-field>
            </div>

            <!-- Descrição Field -->
            <div class="col-span-12 md:col-span-10">
              <app-form-field
                [control]="formGroup.get('descricao')"
                label="Descrição"
                [required]="true"
                fieldId="descricao"
                hint="Digite o nome do grupo">
                <input
                  pInputText
                  id="descricao"
                  formControlName="descricao"
                  class="w-full"
                  placeholder="Ex: Equipamentos de Rede" />
              </app-form-field>
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="flex justify-end gap-2 mt-4">
            <app-cancelar (cancelClick)="back()"></app-cancelar>
            <app-salvar [typeButton]="'submit'" [disabled]="isLoading()"></app-salvar>
          </div>
        </form>
      }
    </ng-template>
  </p-card>
</div>

<!-- Itens Vinculados Dialog -->
<p-dialog
  header="Itens Vinculados"
  [visible]="dialogItensVinculados()"
  (visibleChange)="dialogItensVinculados.set($event)"
  [modal]="true"
  [baseZIndex]="Z_INDEX.DIALOG"
  [appendTo]="'body'"
  class="dialog-lg"
  [focusOnShow]="false"
  [dismissableMask]="true">

  <ng-template pTemplate="content">
    <!-- Filter Input -->
    <div class="mb-4">
      <p-iconField class="w-full" iconPosition="left">
        <p-inputIcon aria-hidden="true" class="pi pi-search"></p-inputIcon>
        <input
            (ngModelChange)="onFilterItens($event)"
            [ngModel]="filtroItens"
            autocomplete="off"
            class="w-full"
            pInputText
            placeholder="Buscar por código ou nome..."
            type="text"/>
      </p-iconField>
    </div>

    <p-table
        [value]="itensVinculados()"
        [scrollable]="true"
        scrollHeight="400px"
        (onPage)="onPageChangeItens($event)"
        [first]="firstItens()"
        [lazy]="true"
        [loading]="loadingItensVinculados()"
        [paginator]="true"
        [rowsPerPageOptions]="[10, 25, 50]"
        [rows]="pageSizeItens()"
        [showCurrentPageReport]="true"
        [totalRecords]="totalItensVinculados()"
        currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} itens"
        paginatorDropdownAppendTo="body"
        styleClass="p-datatable-sm">

      <ng-template pTemplate="header">
        <tr>
          <th class="w-100px" scope="col">Código</th>
          <th scope="col">Descrição</th>
        </tr>
      </ng-template>

      <ng-template let-item pTemplate="body">
        <tr>
          <td>{{ item.id }}</td>
          <td>{{ item.nome }}</td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td class="text-center py-4" colspan="2">
            <div class="flex flex-col items-center gap-2">
              <i class="pi pi-inbox text-4xl text-gray-400"></i>
              <p class="text-gray-600">Nenhum item vinculado a este grupo</p>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </ng-template>
</p-dialog>
