@if (showProgress) {
  <p-progressBar mode="indeterminate" class="login-progress"></p-progressBar>
}

<div class="login-page">
  <section class="login-panel">
    <header class="login-header">
      <img alt="Logo UTFPR" class="login-logo" height="117" ngSrc="utfpr.jpg" width="335"/>
      <span class="login-title">Sistema Laboratório - Confirmar Email</span>
    </header>

    <div class="login-form">
      <p class="confirmation-message">
        Clique no botão abaixo para validar seu email e ativar sua conta no sistema.
      </p>

      <button
        type="button"
        (click)="submit()"
        [disabled]="showProgress"
        class="login-submit"
      >
        Validar o email
      </button>

      <menu class="login-links" role="list">
        <button type="button" (click)="goToLogin()" class="login-link">
          Voltar para a tela de autenticação
        </button>
      </menu>
    </div>
  </section>
</div>
