@if (showProgress) {
  <p-progressBar mode="indeterminate" class="login-progress"></p-progressBar>
}

<div class="login-page">
  <section class="login-panel">
    <header class="login-header">
      <img alt="Logo UTFPR" class="login-logo" height="117" ngSrc="utfpr.jpg" width="335"/>
      <span class="login-title">Sistema Laboratório - Confirmar Email</span>
    </header>

    <form
      [formGroup]="form"
      class="login-form"
      (ngSubmit)="submit()"
      novalidate
    >
      <div class="form-field">
        <input
          pInputText
          type="email"
          id="email"
          formControlName="email"
          placeholder="Email institucional"
          aria-label="Email institucional"
          class="login-input"
          [class.input-error]="form.get('email')?.invalid && form.get('email')?.touched"
        />
        @if (getErrorMessage('email')) {
          <small class="error-message">{{ getErrorMessage('email') }}</small>
        }
      </div>

      <menu class="login-links" role="list">
        <button type="button" (click)="goToLogin()" class="login-link">
          Voltar para a tela de autenticação
        </button>
      </menu>

      <button
        type="submit"
        [disabled]="form.invalid || showProgress"
        class="login-submit"
      >
        Enviar
      </button>
    </form>
  </section>
</div>
