<!-- Custom Aside Navigation Sidebar -->
<aside
  [class.sidebar-hidden]="!sidebarVisible"
  [class.sidebar-visible]="sidebarVisible"
  class="sidebar">

  <div class="sidebar-content">
    <!-- Main menu items -->
    <nav class="sidebar-nav">
      @for (menuItem of menuItems; track menuItem.id) {
        <a
          [id]="menuItem.id"
          [routerLink]="menuItem.routerLink"
          routerLinkActive="active-menu-item"
          [routerLinkActiveOptions]="menuItem.id === 'home' ? {exact: true} : {exact: false}"
          class="sidebar-menu-item"
          (click)="closeSidebar()">
          <i [class]="menuItem.icon" class="sidebar-menu-icon"></i>
          <span class="sidebar-menu-label">{{ menuItem.label }}</span>
        </a>
      }

      <!-- Cadastros submenu -->
      @if (showCadastros) {
        <div class="cadastros-section">
          <button
            type="button"
            class="sidebar-menu-item submenu-toggle"
            (click)="toggleSubMenuCadastro()"
            [attr.aria-expanded]="showSubMenuCadastro">
            <i class="pi pi-pencil sidebar-menu-icon"></i>
            <span class="sidebar-menu-label">Cadastros</span>
            <i [class]="showSubMenuCadastro ? 'pi pi-chevron-down' : 'pi pi-chevron-right'"
               class="submenu-arrow"></i>
          </button>

          @if (showSubMenuCadastro) {
            <div class="submenu-content">
              @for (menuItem of menuCadastros; track menuItem.id) {
                <a
                  [id]="menuItem.id"
                  [routerLink]="menuItem.routerLink"
                  routerLinkActive="active-menu-item"
                  [routerLinkActiveOptions]="{exact: false}"
                  class="sidebar-menu-item submenu-item"
                  (click)="closeSidebar()">
                  <i [class]="menuItem.icon" class="sidebar-menu-icon"></i>
                  <span class="sidebar-menu-label">{{ menuItem.label }}</span>
                </a>
              }
            </div>
          }
        </div>
      }
    </nav>

    <!-- Theme Toggle at bottom -->
    <div class="theme-toggle-section">
      <div class="theme-toggle-divider"></div>
      <div class="theme-toggle-container">
        <span class="theme-toggle-label">Tema</span>
        <app-theme-toggle></app-theme-toggle>
      </div>
    </div>
  </div>
</aside>

<!-- Backdrop for mobile view -->
@if (!isDesktopView && sidebarVisible) {
  <button
    type="button"
    class="sidebar-backdrop"
    (click)="closeSidebar()"
    aria-label="Fechar menu">
  </button>
}
