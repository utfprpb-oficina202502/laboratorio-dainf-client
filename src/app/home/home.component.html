<div class="p-3" id="container-dashboard-aluno" *ngIf="showDashboardAluno">
  <h1 class="text-xl font-semibold">Bem vindo!</h1>
</div>

<div class="p-3 space-y-6" id="container-dashboard" *ngIf="!showDashboardAluno">

  <p-panel styleClass="mb-3">
    <div class="flex justify-center items-center gap-2">
      <span class="font-bold text-center text-base md:text-lg">Dados dos dias {{ getDateIni() }} a {{ getDateFim() }}</span>
      <p-button
        icon="pi pi-filter"
        variant="text"
        pTooltip="Filtrar"
        (onClick)="dialodFiltroData = true">
      </p-button>
    </div>
  </p-panel>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    <app-stat-card
      title="Total de Empréstimos"
      [value]="dashEmprestimoCount?.total"
      icon="fa-handshake-o"
      accentColor="#3B82F6">
    </app-stat-card>

    <app-stat-card
      title="Empréstimos em Andamento"
      [value]="dashEmprestimoCount?.emAndamento"
      icon="fa-ellipsis-h"
      accentColor="#F97316">
    </app-stat-card>

    <app-stat-card
      title="Empréstimos em Atraso"
      [value]="dashEmprestimoCount?.emAtraso"
      icon="fa-calendar-times-o"
      accentColor="#EF4444">
    </app-stat-card>

    <app-stat-card
      title="Empréstimos Finalizados"
      [value]="dashEmprestimoCount?.finalizado"
      icon="fa-check"
      accentColor="#22C55E">
    </app-stat-card>
  </div>

  <p-panel styleClass="mb-3">
    <ng-template pTemplate="header">
      <h6 class="font-bold text-center m-0">Total de Empréstimos Realizados por Dia</h6>
    </ng-template>
    <div id="chartdiv2" class="h-[450px]"></div>
  </p-panel>

  <p-panel styleClass="mb-3">
    <ng-template pTemplate="header">
      <h6 class="font-bold text-center m-0">Top 10 | Itens Emprestados</h6>
    </ng-template>
    <div id="chartdiv4" class="h-[450px]"></div>
  </p-panel>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
    <div>
      <p-panel>
        <ng-template pTemplate="header">
          <h6 class="font-bold text-center m-0">Top 10 | Itens Adquiridos</h6>
        </ng-template>
        <div id="chartdivPie1" class="chart-pie"></div>
      </p-panel>
    </div>

    <div>
      <p-panel>
        <ng-template pTemplate="header">
          <h6 class="font-bold text-center m-0">Top 10 | Itens com Saídas</h6>
        </ng-template>
        <div id="chartdivPie2" class="chart-pie"></div>
      </p-panel>
    </div>
  </div>
</div>

<p-dialog header="Filtro"
          styleClass="filtro-dialog"
          [(visible)]="dialodFiltroData"
          [style]="{minWidth: '400px'}"
          [modal]="true"
          [baseZIndex]="10000">
  <form class="space-y-4">
    <div>
      <label for="dtIni" class="block mb-2 font-medium">Data Inicial</label>
      <p-datepicker name="dtIni"
                    id="dtIni"
                    appendTo="body"
                    dataType="string"
                    dateFormat="dd/mm/yy"
                    showIcon="true"
                    styleClass="w-full filtro-datepicker"
                    [(ngModel)]="dtIniFiltro">
      </p-datepicker>
    </div>
    <div>
      <label for="dtFim" class="block mb-2 font-medium">Data Final</label>
      <p-datepicker name="dtFim"
                    id="dtFim"
                    appendTo="body"
                    dataType="string"
                    dateFormat="dd/mm/yy"
                    showIcon="true"
                    styleClass="w-full filtro-datepicker"
                    [(ngModel)]="dtFimFiltro">
      </p-datepicker>
    </div>
    <ng-template pTemplate="footer">
      <div class="flex justify-end gap-2">
        <p-button
          label="Cancelar"
          severity="secondary"
          (onClick)="dialodFiltroData = false">
        </p-button>
        <p-button
          label="Filtrar"
          [disabled]="disableBtnFiltrar()"
          (onClick)="filtrar()">
        </p-button>
      </div>
    </ng-template>
  </form>
</p-dialog>
