<div class="p-3" id="container-dashboard-aluno" style="display: none">
  <h1>Bem vindo!</h1>
</div>
<div class="p-3" id="container-dashboard" style="display: none">

  <p-panel styleClass="mb-3">
    <div class="flex justify-center items-center">
      <span class="font-bold text-center mr-2 text-lg">Dados dos dias {{this.getDateIni()}}
        a {{this.getDateFim()}}</span>
      <p-button
        icon="pi pi-filter"
        [text]="true"
        pTooltip="Filtrar"
        (onClick)="dialodFiltroData = true">
      </p-button>
    </div>
  </p-panel>

  <div class="grid grid-cols-1 xs:grid-cols-2 mdp:grid-cols-4 gap-4 mt-4">
    <app-stat-card
      title="Total de Empréstimos"
      [value]="dashEmprestimoCount?.total"
      icon="pi-handshake"
      accentColor="#3B82F6">
    </app-stat-card>

    <app-stat-card
      title="Empréstimos em Andamento"
      [value]="dashEmprestimoCount?.emAndamento"
      icon="pi-clock"
      accentColor="#F97316">
    </app-stat-card>

    <app-stat-card
      title="Empréstimos em Atraso"
      [value]="dashEmprestimoCount?.emAtraso"
      icon="pi-exclamation-triangle"
      accentColor="#EF4444">
    </app-stat-card>

    <app-stat-card
      title="Empréstimos Finalizados"
      [value]="dashEmprestimoCount?.finalizado"
      icon="pi-check"
      accentColor="#22C55E">
    </app-stat-card>
  </div>

  <p-panel styleClass="mb-3">
    <ng-template pTemplate="header">
      <h6 class="font-bold text-center m-0">Total de Empréstimos Realizados por Dia</h6>
    </ng-template>
    <div class="chartdiv2" style="height: 450px"></div>
  </p-panel>

  <p-panel styleClass="mb-3">
    <ng-template pTemplate="header">
      <h6 class="font-bold text-center m-0">Top 10 | Itens Emprestados</h6>
    </ng-template>
    <div class="chartdiv4" style="height: 450px"></div>
  </p-panel>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <p-panel>
        <ng-template pTemplate="header">
          <h6 class="font-bold text-center m-0">Top 10 | Itens Adquiridos</h6>
        </ng-template>
        <div class="chartdivPie1" style="height: 450px"></div>
      </p-panel>
    </div>

    <div>
      <p-panel>
        <ng-template pTemplate="header">
          <h6 class="font-bold text-center m-0">Top 10 | Itens com Saídas</h6>
        </ng-template>
        <div class="chartdivPie2" style="height: 450px"></div>
      </p-panel>
    </div>
  </div>

</div>

<p-dialog header="Filtro"
          [(visible)]="dialodFiltroData"
          [style]="{minWidth: '400px'}"
          [modal]="true"
          [baseZIndex]="10000">

  <form>
    <div class="mb-4">
      <label for="dtIni" class="block mb-2">Data Inicial</label>
      <p-datePicker name="dtIni"
                  id="dtIni"
                  appendTo="body"
                  dataType="string"
                  dateFormat="dd/mm/yy"
                  [(ngModel)]="dtIniFiltro"
                  styleClass="w-full">
      </p-datePicker>
    </div>
    <div class="mb-4">
      <label for="dtFim" class="block mb-2">Data Final</label>
      <p-datePicker name="dtFim"
                  id="dtFim"
                  appendTo="body"
                  dataType="string"
                  dateFormat="dd/mm/yy"
                  [(ngModel)]="dtFimFiltro"
                  styleClass="w-full">
      </p-datePicker>
    </div>
    <ng-template pTemplate="footer">
      <div class="flex justify-end gap-2">
        <p-button
          label="Cancelar"
          severity="secondary"
          (onClick)="dialodFiltroData = false">
        </p-button>
        <p-button
          label="Filtrar"
          [disabled]="disableBtnFiltrar()"
          (onClick)="filtrar()">
        </p-button>
      </div>
    </ng-template>
  </form>
</p-dialog>
