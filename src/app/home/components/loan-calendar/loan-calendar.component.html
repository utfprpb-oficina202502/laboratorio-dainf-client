<p-card>
  <ng-template pTemplate="header">
    <div class="flex items-center gap-2 px-4 pt-4">
      <i aria-hidden="true" class="pi pi-calendar text-lg"
         style="color: var(--color-text-secondary)"></i>
      <h3 class="text-lg font-semibold m-0" style="color: var(--color-text-primary)">Meu
        Calendário</h3>
    </div>
  </ng-template>

  @if (loading() && !initialized()) {
    <!-- Skeleton no carregamento inicial -->
    <div class="p-4">
      <p-skeleton height="18rem" width="100%"/>
    </div>
  } @else {
    <!-- Calendário com overlay de loading para troca de mês -->
    <div class="p-4 relative">
      @if (loading()) {
        <div class="absolute inset-0 flex items-center justify-center z-10"
             style="background: color-mix(in srgb, var(--color-bg-primary) 85%, transparent)">
          <i class="pi pi-spin pi-spinner text-2xl" style="color: var(--p-primary-color)"></i>
        </div>
      }
      <p-datepicker
        [(ngModel)]="selectedDate"
        (onMonthChange)="onMonthChange($event)"
        [inline]="true"
        [showWeek]="false"
        [style]="{ width: '100%' }"
        class="loan-calendar"
        dateFormat="dd/mm/yy"
      >
        <ng-template let-date pTemplate="date">
          @if (hasEvents(date)) {
            <span
              [pTooltip]="getTooltip(date)"
              [style.background-color]="getDominantColor(date) + '30'"
              [style.border]="'2px solid ' + getDominantColor(date)"
              class="flex items-center justify-center w-8 h-8 rounded-full cursor-pointer transition-all"
              tooltipPosition="top"
            >
              {{ date.day }}
            </span>
          } @else {
            <span class="flex items-center justify-center w-8 h-8">
              {{ date.day }}
            </span>
          }
        </ng-template>
      </p-datepicker>

      <!-- Legenda -->
      <div class="flex flex-wrap gap-3 mt-4 pt-4" style="border-top: 1px solid var(--color-border)">
        <div class="flex items-center gap-1">
          <span [style.background-color]="eventColors.RETIRADA" class="w-3 h-3 rounded-full"></span>
          <span class="text-xs" style="color: var(--color-text-secondary)">Retirada</span>
        </div>
        <div class="flex items-center gap-1">
          <span [style.background-color]="eventColors.DEVOLUCAO_PREVISTA"
                class="w-3 h-3 rounded-full"></span>
          <span class="text-xs" style="color: var(--color-text-secondary)">Devolução prevista</span>
        </div>
        <div class="flex items-center gap-1">
          <span [style.background-color]="eventColors.DEVOLUCAO_REALIZADA"
                class="w-3 h-3 rounded-full"></span>
          <span class="text-xs" style="color: var(--color-text-secondary)">Devolvido</span>
        </div>
        <div class="flex items-center gap-1">
          <span [style.background-color]="eventColors.ATRASADO" class="w-3 h-3 rounded-full"></span>
          <span class="text-xs" style="color: var(--color-text-secondary)">Atrasado</span>
        </div>
      </div>
    </div>
  }
</p-card>
