<p-card>
  <ng-template pTemplate="header">
    <div class="flex items-center gap-2 px-4 pt-4">
      <i aria-hidden="true" class="pi pi-history text-lg text-gray-600"></i>
      <h3 class="text-lg font-semibold m-0">Atividades Recentes</h3>
    </div>
  </ng-template>

  @if (loading()) {
    <div class="space-y-4 p-4">
      @for (i of [1, 2, 3, 4]; track i) {
        <div class="flex items-start gap-3">
          <p-skeleton shape="circle" size="2.5rem"/>
          <div class="flex-1 space-y-2">
            <p-skeleton height="1rem" width="60%"/>
            <p-skeleton height="0.875rem" width="80%"/>
          </div>
        </div>
      }
    </div>
  } @else if (!hasActivities()) {
    <div class="flex flex-col items-center justify-center py-8 text-gray-500">
      <i aria-hidden="true" class="pi pi-inbox text-4xl mb-2"></i>
      <p class="text-sm">Nenhuma atividade recente</p>
    </div>
  } @else {
    <p-timeline [value]="timelineItems()" align="left" class="p-4">
      <ng-template let-item pTemplate="marker">
        <span
          [style.background-color]="item.color + '20'"
          class="flex items-center justify-center w-10 h-10 rounded-full"
        >
          <i [class]="item.icon" [style.color]="item.color" aria-hidden="true"></i>
        </span>
      </ng-template>

      <ng-template let-item pTemplate="content">
        <div class="pb-4">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-xs text-gray-500">{{ item.formattedDate }}
              às {{ item.formattedTime }}</span>
            <span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600">
              {{ item.periodLabel }}
            </span>
          </div>
          <p class="font-medium text-sm text-gray-800 m-0">{{ item.activity.titulo }}</p>
          <p class="text-sm text-gray-600 m-0">{{ item.activity.descricao }}</p>
          <p-button
            [link]="true"
            [routerLink]="getRouterLink(item)"
            class="mt-1"
            label="Ver detalhes"
            size="small"
          />
        </div>
      </ng-template>
    </p-timeline>
  }
</p-card>
