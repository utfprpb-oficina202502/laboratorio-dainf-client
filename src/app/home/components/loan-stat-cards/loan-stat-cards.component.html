@if (loading()) {
  <app-skeleton-card/>
  <app-skeleton-card/>
  <app-skeleton-card/>
  <app-skeleton-card/>
} @else {
  <app-stat-card
    [value]="stats()?.emprestimosEmAberto ?? 0"
    accentColor="#3B82F6"
    icon="clock"
    iconLibrary="pi"
    title="Empréstimos Ativos"
  />
  <app-stat-card
    [value]="stats()?.emprestimosEmAtraso ?? 0"
    accentColor="#EF4444"
    icon="exclamation-triangle"
    iconLibrary="pi"
    title="Empréstimos Atrasados"
  />
  <app-stat-card
    [value]="proximaDevolucaoText()"
    [accentColor]="proximaDevolucaoColor()"
    icon="calendar"
    iconLibrary="pi"
    [title]="proximaDevolucaoTitle()"
  />
  <app-stat-card
    [value]="stats()?.emprestimosTotal ?? 0"
    accentColor="#22C55E"
    icon="check-circle"
    iconLibrary="pi"
    title="Total de Empréstimos"
  />
}
