<p-card styleClass="item-card h-full">
  <!-- Imagem do item -->
  <ng-template pTemplate="header">
    <div class="item-card-image-container relative">
      <button
        (click)="onViewDetails()"
        [attr.aria-label]="'Ver detalhes de ' + item().nome"
        class="w-full p-0 border-0 bg-transparent cursor-pointer"
        type="button">
        <img
          [alt]="item().nome"
          [src]="imageUrl()"
          class="item-card-image w-full h-40 object-cover"/>
      </button>

      <!-- Tag de grupo -->
      @if (item().grupo?.descricao) {
        <p-tag
          [rounded]="true"
          [value]="item().grupo?.descricao ?? ''"
          class="absolute top-2 left-2"
          severity="info"/>
      }

      <!-- Badge de quantidade no carrinho -->
      @if (isInCart()) {
        <div
          class="absolute top-2 right-2 bg-primary text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold">
          {{ cartQuantity() }}
        </div>
      }
    </div>
  </ng-template>

  <!-- Conteúdo do card -->
  <div class="flex flex-col gap-2">
    <!-- Nome do item -->
    <button
      (click)="onViewDetails()"
      [pTooltip]="item().nome"
      class="text-left text-base font-semibold m-0 p-0 border-0 bg-transparent cursor-pointer hover:text-primary transition-colors"
      tooltipPosition="top"
      type="button">
      <h3 class="m-0 line-clamp-2">{{ item().nome }}</h3>
    </button>

    <!-- Localização -->
    @if (item().localizacao) {
      <div class="flex items-center gap-1 text-sm text-color-secondary">
        <i class="pi pi-map-marker text-xs"></i>
        <span class="truncate">{{ item().localizacao }}</span>
      </div>
    }

    <!-- Disponibilidade -->
    <div class="flex items-center gap-2">
      <p-tag
        [rounded]="true"
        [severity]="availabilitySeverity()"
        [value]="disponibilidade() + ' disponível(is)'"/>
    </div>
  </div>

  <!-- Rodapé com controles -->
  <ng-template pTemplate="footer">
    <div class="flex flex-col gap-2">
      @if (isInCart()) {
        <!-- Item já está no carrinho -->
        <div class="flex items-center justify-between gap-2">
          <span class="text-sm text-color-secondary">
            <i class="pi pi-check-circle text-green-500 mr-1"></i>
            No carrinho ({{ cartQuantity() }})
          </span>
          <p-button
            (onClick)="removeFromCart()"
            [rounded]="true"
            [text]="true"
            aria-label="Remover do carrinho"
            icon="pi pi-trash"
            pTooltip="Remover do carrinho"
            severity="danger"
            size="small"
            tooltipPosition="top"/>
        </div>

        <!-- Adicionar mais (se houver disponibilidade) -->
        @if (hasAvailability()) {
          <div class="flex items-center gap-2">
            <div class="flex items-center border border-surface-300 rounded-md">
              <p-button
                (onClick)="decrementQuantity()"
                [disabled]="quantidade() <= 1"
                [text]="true"
                aria-label="Diminuir quantidade"
                icon="pi pi-minus"
                size="small"/>
              <span class="px-3 text-sm font-medium min-w-[2rem] text-center">
                {{ quantidade() }}
              </span>
              <p-button
                (onClick)="incrementQuantity()"
                [disabled]="quantidade() >= maxToAdd()"
                [text]="true"
                aria-label="Aumentar quantidade"
                icon="pi pi-plus"
                size="small"/>
            </div>
            <p-button
              (onClick)="addToCart()"
              [disabled]="quantidade() > maxToAdd()"
              [outlined]="true"
              class="flex-1"
              icon="pi pi-plus"
              label="Adicionar mais"
              size="small"/>
          </div>
        }
      } @else {
        <!-- Item não está no carrinho -->
        @if (hasAvailability()) {
          <div class="flex items-center gap-2">
            <div class="flex items-center border border-surface-300 rounded-md">
              <p-button
                (onClick)="decrementQuantity()"
                [disabled]="quantidade() <= 1"
                [text]="true"
                aria-label="Diminuir quantidade"
                icon="pi pi-minus"
                size="small"/>
              <span class="px-3 text-sm font-medium min-w-[2rem] text-center">
                {{ quantidade() }}
              </span>
              <p-button
                (onClick)="incrementQuantity()"
                [disabled]="quantidade() >= maxToAdd()"
                [text]="true"
                aria-label="Aumentar quantidade"
                icon="pi pi-plus"
                size="small"/>
            </div>
            <p-button
              (onClick)="addToCart()"
              [disabled]="quantidade() > maxToAdd()"
              class="flex-1"
              icon="pi pi-shopping-cart"
              label="Adicionar"
              size="small"/>
          </div>
        } @else {
          <!-- Sem disponibilidade -->
          <p-button
            [disabled]="true"
            class="w-full"
            icon="pi pi-ban"
            label="Indisponível"
            severity="secondary"
            size="small"/>
        }
      }
    </div>
  </ng-template>
</p-card>
